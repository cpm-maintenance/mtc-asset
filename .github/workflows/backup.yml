name: 🔄 Auto Backup Firebase Data

on:
  schedule:
    # Backup otomatis setiap hari jam 02:00 WIB (19:00 UTC)
    - cron: '0 19 * * *'
  workflow_dispatch:
    # Bisa juga dijalankan manual dari GitHub
    inputs:
      reason:
        description: 'Reason for manual backup'
        required: false
        default: 'Manual trigger'

jobs:
  backup:
    name: Backup Firebase Database
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: 📥 Backup Firebase Data
        id: backup
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: mtc-asset
        run: |
          echo "Starting backup at $(date)"
          
          # Buat folder backups
          mkdir -p backups
          
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          BACKUP_FILE="backups/backup-${TIMESTAMP}.json"
          
          # Backup semua node
          NODES=("Equipment" "SpareParts" "HistoryLog" "Performance" "Users" "Stats" "Settings" "AI_Settings" "ImageUploads")
          
          echo "{" > "$BACKUP_FILE"
          echo '  "_metadata": {' >> "$BACKUP_FILE"
          echo '    "exportedAt": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",' >> "$BACKUP_FILE"
          echo '    "project": "mtc-asset",' >> "$BACKUP_FILE"
          echo '    "trigger": "${{ github.event_name }}",' >> "$BACKUP_FILE"
          echo '    "workflow": "'${{ github.run_id }}'"' >> "$BACKUP_FILE"
          echo '  },' >> "$BACKUP_FILE"
          
          FIRST=true
          for NODE in "${NODES[@]}"; do
            echo "  Backing up /${NODE}..."
            echo "  \"${NODE}\": " >> "$BACKUP_FILE"
            firebase database:get "/${NODE}" --project "$PROJECT_ID" --token "$FIREBASE_TOKEN" 2>/dev/null >> "$BACKUP_FILE" || echo "{}" >> "$BACKUP_FILE"
            
            if [ "$NODE" != "${NODES[-1]}" ]; then
              echo "," >> "$BACKUP_FILE"
            fi
            echo "" >> "$BACKUP_FILE"
          done
          
          echo "}" >> "$BACKUP_FILE"
          
          # Validasi JSON
          if command -v jq &> /dev/null; then
            jq '.' "$BACKUP_FILE" > /dev/null && echo "✅ Valid JSON" || echo "❌ Invalid JSON"
          fi
          
          echo "✅ Backup complete: ${BACKUP_FILE}"
          echo "SIZE=$(du -h "$BACKUP_FILE" | cut -f1)" >> $GITHUB_OUTPUT

      - name: 📝 Update LATEST reference
        run: |
          echo "backup-$(date +"%Y-%m-%d_%H-%M-%S").json" > backups/LATEST.txt

      - name: 🧹 Clean old backups (keep last 30)
        run: |
          cd backups
          ls -1 backup-*.json 2>/dev/null | sort | head -n -30 | while read old; do
            echo "  Removing old backup: $old"
            rm "$old"
          done

      - name: Git Config
        run: |
          git config user.name "MTC Asset Bot"
          git config user.email "mtc-asset-bot@users.noreply.github.com"

      - name: 📤 Commit & Push Backup
        run: |
          git add backups/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "✅ No changes to backup"
          else
            git commit -m "📦 Auto backup: $(date +'%Y-%m-%d %H:%M')
            
            Automatic Firebase database backup
            Trigger: ${{ github.event_name }}
            Run ID: ${{ github.run_id }}"
            git push
            echo "✅ Backup pushed to GitHub"
          fi
