<!-- 🛒 PAGE: REQUEST PART / MATERIAL GENERAL -->
<div x-cloak class="space-y-4">
  <!-- Header with Title and Actions -->
  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
    <h3 class="font-black text-xl lg:text-2xl text-amber-400 nexus-glow-text uppercase tracking-tight">Request Part</h3>
    <div class="flex flex-wrap gap-2 items-center">
      <button @click="openRequisitionModal()" class="btn-nexus-gold"><i class="fas fa-plus"></i> New Request</button>
      <button x-show="isAdminOrSupervisor && reqSelectedIds.length > 0" @click="bulkApproveRequisitions()"
        class="px-4 py-2 bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 rounded-xl text-xs font-bold hover:bg-emerald-500/30 transition-all flex items-center gap-2 animate-pulse">
        <i class="fas fa-check-double"></i> Approve (<span x-text="reqSelectedIds.length"></span>)
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex flex-wrap gap-3 items-center">
    <select x-model="reqFilterStatus" class="p-3 glass border-nexus-accent/10 text-xs font-bold max-w-[160px]">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="approved">Approved</option>
      <option value="arrived">Arrived</option>
      <option value="closed">Closed</option>
    </select>
    <select x-model="reqFilterType" class="p-3 glass border-nexus-accent/10 text-xs font-bold max-w-[160px]">
      <option value="">All Types</option>
      <option value="part">Spare Part</option>
      <option value="material">General Material</option>
    </select>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <div class="glass border-nexus-accent/10 p-4 text-center border-l-2 border-amber-500">
      <div class="text-xl md:text-2xl font-black text-amber-500" x-text="(requisitions||[]).filter(r => r.status === 'pending').length || '0'"></div>
      <div class="text-[10px] text-slate-500 uppercase tracking-widest">Pending</div>
    </div>
    <div class="glass border-nexus-accent/10 p-4 text-center border-l-2 border-cyan-500">
      <div class="text-xl md:text-2xl font-black text-cyan-500" x-text="(requisitions||[]).filter(r => r.status === 'approved').length || '0'"></div>
      <div class="text-[10px] text-slate-500 uppercase tracking-widest">Approved</div>
    </div>
    <div class="glass border-nexus-accent/10 p-4 text-center border-l-2 border-emerald-500">
      <div class="text-xl md:text-2xl font-black text-emerald-500" x-text="(requisitions||[]).filter(r => r.status === 'arrived').length || '0'"></div>
      <div class="text-[10px] text-slate-500 uppercase tracking-widest">Arrived</div>
    </div>
    <div class="glass border-nexus-accent/10 p-4 text-center border-l-2 border-slate-500">
      <div class="text-xl md:text-2xl font-black text-slate-400" x-text="(requisitions||[]).filter(r => r.status === 'closed').length || '0'"></div>
      <div class="text-[10px] text-slate-500 uppercase tracking-widest">Closed</div>
    </div>
  </div>

  <!-- Loading State (Skeleton) -->
  <div x-show="reqLoading" class="space-y-3">
    <template x-for="i in 4" :key="i">
      <div class="skeleton skeleton-card p-4">
        <div class="skeleton skeleton-line skeleton-sm" style="width:40%"></div>
        <div class="skeleton skeleton-line skeleton-md" style="width:70%"></div>
        <div class="skeleton skeleton-line skeleton-sm" style="width:25%"></div>
      </div>
    </template>
  </div>

  <!-- Empty State -->
  <div x-show="!reqLoading && reqGetFilteredList().length === 0" class="text-center py-16">
    <div class="inline-flex flex-col items-center gap-4">
      <i class="fas fa-shopping-cart text-6xl text-slate-600"></i>
      <div>
        <p class="text-slate-400 text-lg font-bold">No Requests Found</p>
        <p class="text-slate-500 text-sm mt-2">Click <span class="text-amber-400 font-bold">+ New Request</span> to create one</p>
      </div>
    </div>
  </div>

  <!-- Request Cards (Expandable CRUD) -->
  <div x-show="!reqLoading && reqGetFilteredList().length > 0" class="flex flex-col gap-4">
    <template x-for="(req, idx) in reqGetFilteredList()" :key="req.id || idx">
      <div class="glass border-nexus-accent/10 rounded-xl overflow-hidden"
        :style="'border-left: 4px solid ' + (req.status === 'pending' ? '#f59e0b' : req.status === 'approved' ? '#06b6d4' : req.status === 'arrived' ? '#10b981' : '#64748b')">
        <!-- Header - Click to expand -->
        <div @click="selectedRequisition = selectedRequisition?.id === req.id ? null : req; if(selectedRequisition?.id === req.id) reqShowDetail = true; else reqShowDetail = false" class="p-4 cursor-pointer hover:bg-white/5 transition-all">
          <div class="flex justify-between items-start">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                :class="{
                  'bg-amber-500/20': req.status === 'pending',
                  'bg-cyan-500/20': req.status === 'approved',
                  'bg-emerald-500/20': req.status === 'arrived',
                  'bg-slate-500/20': req.status === 'closed',
                }">
                <i class="fas text-xs" :class="{
                  'fa-clock text-amber-400': req.status === 'pending',
                  'fa-check-circle text-amber-400': req.status === 'approved',
                  'fa-box-open text-emerald-400': req.status === 'arrived',
                  'fa-check-double text-slate-400': req.status === 'closed',
                }"></i>
              </div>
              <span class="font-black text-sm text-white truncate max-w-[200px] md:max-w-[300px]"
                x-text="(req.items && req.items.length > 1) ? (req.items[0].itemName + ' +' + (req.items.length-1) + ' other') : (req.itemName || req.items?.[0]?.itemName || '')"></span>
              <span x-show="req.priority === 'urgent'" class="px-1.5 py-0.5 rounded bg-red-500/20 text-red-400 font-bold uppercase text-[9px] tracking-wider"><i class="fas fa-exclamation-triangle mr-0.5"></i>Urgent</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="px-2 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border"
                :class="{
                  'text-amber-400 border-amber-500/30 bg-amber-500/10': req.status === 'pending',
                  'text-cyan-400 border-cyan-500/30 bg-cyan-500/10': req.status === 'approved',
                  'text-emerald-400 border-emerald-500/30 bg-emerald-500/10': req.status === 'arrived',
                  'text-slate-400 border-slate-500/30 bg-slate-500/10': req.status === 'closed',
                }" x-text="req.status.toUpperCase()"></span>
              <i :class="selectedRequisition?.id === req.id ? 'fa-chevron-up' : 'fa-chevron-down'" class="fas text-slate-500 text-xs"></i>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-4 mt-2 text-[10px] text-slate-500 font-bold uppercase tracking-widest">
            <div class="flex items-center gap-1"><i class="fas fa-boxes text-amber-400"></i> <span x-text="'Total: ' + (req.items ? req.items.length + ' item, ' : '') + req.quantity + ' pcs'"></span></div>
            <div class="flex items-center gap-1"><i class="fas fa-user text-amber-400"></i> <span x-text="req.requesterName || req.createdBy"></span></div>
            <div class="flex items-center gap-1"><i class="far fa-calendar-alt text-amber-400"></i> <span x-text="req.requestDate"></span></div>
            <!-- Edit/Delete always visible -->
            <div class="flex items-center gap-1 ml-auto" @click.stop>
              <button @click="openRequisitionModal(req)"
                class="w-7 h-7 rounded-lg bg-amber-500/10 text-amber-400 hover:bg-amber-500/25 transition-all flex items-center justify-center"
                title="Edit">
                <i class="fas fa-pen text-[10px]"></i>
              </button>
              <button @click="deleteRequisition(req.id)"
                class="w-7 h-7 rounded-lg bg-rose-500/10 text-rose-400 hover:bg-rose-500/25 transition-all flex items-center justify-center"
                title="Delete">
                <i class="fas fa-trash text-[10px]"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Detail View (Expandable) -->
        <div x-show="selectedRequisition?.id === req.id" class="border-t border-white/10">
          <div class="p-4 space-y-3">
            <!-- Items List -->
            <div>
              <span class="text-slate-500 uppercase text-[10px] font-black tracking-widest mb-2 block flex items-center gap-2">
                <i class="fas fa-list text-amber-400"></i> Items (<span x-text="req.items ? req.items.length : 1"></span>)
              </span>
              <div class="space-y-2">
                <template x-for="(item, iIdx) in (req.items || [req])" :key="iIdx">
                  <div class="bg-slate-800/50 p-3 rounded-xl border border-white/5">
                    <div class="flex items-start justify-between gap-2">
                      <div class="flex-1">
                        <p class="text-white font-bold text-sm" x-text="(iIdx+1) + '. ' + item.itemName"></p>
                        <div class="flex flex-wrap gap-3 mt-1 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                          <span x-show="item.itemType"><i class="fas fa-tag text-amber-400/70 mr-1"></i><span x-text="item.itemType === 'part' ? 'Spare Part' : 'Material'"></span></span>
                          <span><i class="fas fa-hashtag text-amber-400/70 mr-1"></i>Qty: <span x-text="item.quantity + ' ' + (item.unit || 'pcs')"></span></span>
                          <span x-show="item.noResv"><i class="fas fa-tag text-cyan-400/70 mr-1"></i>NO RESV: <span class="text-cyan-400" x-text="item.noResv"></span></span>
                          <span x-show="item.partId"><i class="fas fa-barcode text-amber-400/70 mr-1"></i>Part: <span x-text="item.partId"></span></span>
                          <span x-show="item.equipmentId"><i class="fas fa-industry text-amber-400/70 mr-1"></i>Equip: <span x-text="item.equipmentId"></span></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Meta Info -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs">
              <div class="bg-slate-800/50 p-3 rounded-xl">
                <span class="text-slate-500 uppercase text-[10px] font-black tracking-widest">Requested By</span>
                <p class="text-white font-bold text-sm" x-text="req.requesterName || req.createdBy"></p>
              </div>
              <div class="bg-slate-800/50 p-3 rounded-xl">
                <span class="text-slate-500 uppercase text-[10px] font-black tracking-widest">Date</span>
                <p class="text-white font-bold text-sm" x-text="req.requestDate"></p>
              </div>
              <div class="bg-slate-800/50 p-3 rounded-xl" x-show="req.priority">
                <span class="text-slate-500 uppercase text-[10px] font-black tracking-widest">Priority</span>
                <p class="font-bold text-sm uppercase flex items-center gap-1" :class="req.priority === 'urgent' ? 'text-red-400' : 'text-slate-300'">
                  <i x-show="req.priority === 'urgent'" class="fas fa-exclamation-triangle text-red-400"></i>
                  <span x-text="req.priority"></span>
                </p>
              </div>
            </div>

            <!-- Approver + Arrived info -->
            <div x-show="req.approvedBy || req.arrivedDate" class="flex flex-wrap gap-2">
              <div x-show="req.approvedBy" class="bg-emerald-900/20 border border-emerald-500/20 rounded-xl px-4 py-3 flex-1 min-w-[200px]">
                <div class="flex items-center gap-2">
                  <i class="fas fa-check-circle text-emerald-400"></i>
                  <div>
                    <span class="text-[10px] text-emerald-400/70 font-black uppercase tracking-widest">Approved By</span>
                    <p class="text-emerald-300 font-bold text-xs"><span x-text="req.approvedBy"></span><span x-show="req.approvedAt" class="text-emerald-400/60 font-normal ml-1">· <span x-text="req.approvedAt"></span></span></p>
                  </div>
                </div>
              </div>
              <div x-show="req.arrivedDate" class="bg-cyan-900/20 border border-cyan-500/20 rounded-xl px-4 py-3 flex-1 min-w-[200px]">
                <div class="flex items-center gap-2">
                  <i class="fas fa-box-open text-cyan-400"></i>
                  <div>
                    <span class="text-[10px] text-cyan-400/70 font-black uppercase tracking-widest">Arrived</span>
                    <p class="text-cyan-300 font-bold text-xs" x-text="'On: ' + req.arrivedDate"></p>
                  </div>
                </div>
              </div>
            </div>

            <div x-show="req.notes" class="bg-slate-800/50 p-3 rounded-xl">
              <span class="text-slate-500 uppercase text-[10px] font-black tracking-widest">Notes</span>
              <p class="text-white text-sm" x-text="req.notes"></p>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-wrap gap-2 pt-3 border-t border-white/10">
              <button x-show="isAdminOrSupervisor && req.status === 'pending'"
                @click="approveRequisition(req.id)"
                class="px-4 py-2 bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 rounded-lg text-xs font-bold hover:bg-emerald-500/30 transition-all flex items-center gap-2">
                <i class="fas fa-check"></i> Approve
              </button>
              <button x-show="isAdminOrSupervisor && req.status === 'approved'"
                @click="markArrived(req.id)"
                class="px-4 py-2 bg-cyan-600/20 border border-cyan-500/30 text-cyan-400 rounded-lg text-xs font-bold hover:bg-cyan-500/30 transition-all flex items-center gap-2">
                <i class="fas fa-box-open"></i> Arrived
              </button>
              <button x-show="isAdminOrSupervisor && req.status === 'arrived'"
                @click="closeRequisition(req.id)"
                class="px-4 py-2 bg-slate-600/20 border border-slate-500/30 text-slate-400 rounded-lg text-xs font-bold hover:bg-slate-500/30 transition-all flex items-center gap-2">
                <i class="fas fa-check-double"></i> Close
              </button>
              <!-- Bulk checkbox -->
              <div class="flex items-center gap-2 ml-auto" @click.stop>
                <input type="checkbox" x-model="reqSelectedIds" :value="req.id"
                  x-show="req.status === 'pending'"
                  class="w-4 h-4 rounded border-white/20 bg-white/5 text-amber-500 focus:ring-amber-500/50 cursor-pointer">
                <span x-show="req.status === 'pending'" class="text-[10px] text-slate-500">Select</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- ════════════════════════════════════════════ -->
  <!-- NEW REQUEST MODAL (Multi-Item) -->
  <!-- ════════════════════════════════════════════ -->
  <div x-show="showReqModal" x-cloak class="fixed inset-0 z-[300] bg-nexus-black/90 backdrop-blur-sm flex items-center justify-center p-4"
    @click.self="showReqModal = false">
    <div x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      class="w-full max-w-4xl card-modern p-6 md:p-8 border-amber-500/30 max-h-[92vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl md:text-2xl font-black text-white nexus-glow-text flex items-center gap-3">
          <i class="fas fa-shopping-cart text-amber-400"></i>
          <span x-text="reqEditMode ? 'Edit Request' : 'New Multi-Request'"></span>
        </h3>
        <button @click="showReqModal = false" class="w-10 h-10 rounded-lg bg-white/5 text-slate-400 hover:text-white flex items-center justify-center">
          <i class="fas fa-times text-lg"></i>
        </button>
      </div>

      <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-4" x-text="reqEditMode ? 'Edit item details below' : 'Add multiple items in one request'">
      </p>

      <form @submit.prevent="submitRequisition()" class="space-y-4">
        <!-- Item Lines -->
        <div class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
          <template x-for="(item, idx) in reqLineItems" :key="idx">
            <div class="p-4 md:p-5 bg-slate-800/40 rounded-xl border border-white/10 space-y-3 relative">
              <div class="flex items-center justify-between">
                <span class="text-xs font-black text-amber-400 uppercase tracking-widest" x-text="'Item #' + (idx+1)"></span>
                <button type="button" @click="reqRemoveLineItem(idx)"
                  class="text-rose-400 hover:text-rose-300 text-sm font-bold transition-all"
                  x-show="reqLineItems.length > 1">
                  <i class="fas fa-times-circle mr-1"></i> Hapus
                </button>
              </div>
              <div class="grid grid-cols-2 md:grid-cols-12 gap-3">
                <div class="col-span-2">
                  <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">Tipe</label>
                  <select x-model="item.itemType" class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
                    <option value="part">Spare Part</option>
                    <option value="material">Material</option>
                  </select>
                </div>
                <div class="col-span-3">
                  <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">Nama Item *</label>
                  <input type="text" x-model="item.itemName" required placeholder="e.g. Bearing SKF 6205" class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
                </div>
                <div class="col-span-2" x-show="item.itemType === 'part'">
                  <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">Part ID</label>
                  <input type="text" x-model="item.partId" placeholder="P001" class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
                </div>
                <div class="col-span-1">
                  <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">Qty *</label>
                  <input type="number" x-model="item.quantity" required min="1" step="1" class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
                </div>
                <div class="col-span-1">
                  <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">Unit</label>
                  <input type="text" x-model="item.unit" placeholder="pcs" class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
                </div>
                <div class="col-span-3">
                  <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">
                    <i class="fas fa-tag text-amber-400/70 mr-1"></i>NO RESV
                  </label>
                  <input type="text" x-model="item.noResv" placeholder="Nomor Reservasi" class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
                </div>
              </div>
              <div class="grid grid-cols-12 gap-3">
                <div class="col-span-6">
                  <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">Untuk Peralatan</label>
                  <select x-model="item.equipmentId" class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
                    <option value="">— Tidak ditentukan —</option>
                    <template x-for="e in equipment" :key="e.EquipmentID">
                      <option :value="e.EquipmentID" x-text="(e.Nama || e.EquipmentID) + ' (' + e.EquipmentID + ')'"></option>
                    </template>
                  </select>
                </div>
              </div>
            </div>
          </template>
        </div>

        <button type="button" @click="reqAddLineItem()" x-show="!reqEditMode"
          class="w-full py-3 border-2 border-dashed border-amber-500/30 text-amber-400 rounded-xl text-sm font-bold hover:bg-amber-500/10 transition-all flex items-center justify-center gap-2">
          <i class="fas fa-plus"></i> Tambah Item Lain
        </button>

        <div x-show="!reqEditMode" class="grid grid-cols-12 gap-3 pt-3 border-t border-white/5">
          <div class="col-span-4">
            <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">Prioritas (global)</label>
            <select x-model="reqPriority" class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
              <option value="normal">Normal</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
          <div class="col-span-8">
            <label class="text-[10px] text-slate-500 font-black uppercase tracking-widest mb-1 block">Catatan (global)</label>
            <input type="text" x-model="reqNotes" placeholder="Catatan untuk semua item"
              class="w-full p-3 glass border-nexus-accent/10 text-sm font-bold rounded-xl">
          </div>
        </div>

        <div class="flex gap-3 pt-3">
          <button type="button" @click="showReqModal = false" class="flex-1 px-4 py-4 glass text-slate-400 rounded-xl text-sm font-bold hover:text-white transition-all">Batal</button>
          <button type="submit" class="flex-1 px-4 py-4 bg-amber-600/20 border border-amber-500/30 text-amber-400 rounded-xl text-sm font-bold hover:bg-amber-500/30 transition-all">
            <i class="fas fa-paper-plane mr-2"></i>
            <span x-text="reqEditMode ? 'Update' : ('Kirim (' + reqLineItems.filter(i => i.itemName && i.quantity > 0).length + ' item)' + '')"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
