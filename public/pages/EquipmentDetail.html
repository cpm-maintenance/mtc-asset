<!-- 🔍 PAGE: DETAIL EQUIPMENT -->
<div x-cloak class="space-y-8">
  <!-- Header with Back Button and Actions -->
  <div class="flex justify-between items-center glass p-4 rounded-2xl border-nexus-accent/10">
    <button @click="currentPage = 'equip'"
      class="text-nexus-accent hover:text-white text-xs font-black uppercase tracking-widest transition-all flex items-center">
      <i class="fas fa-arrow-left mr-2"></i> Return to Nexus
    </button>
    <div class="flex gap-2">
      <button @click="generateQR(selectedEquip.EquipmentID)"
        class="glass border-nexus-accent/20 text-nexus-accent px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-nexus-accent hover:text-nexus-black transition-all">
        <i class="fas fa-qrcode mr-1"></i> QR
      </button>
      <button @click="exportToPDF(selectedEquip)"
        class="glass border-nexus-purple/20 text-nexus-purple px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-nexus-purple hover:text-white transition-all">
        <i class="fas fa-file-pdf mr-1"></i> PDF
      </button>
      <button x-show="isAdmin" @click="openEquipModal(true, selectedEquip)"
        class="glass border-blue-500/20 text-blue-400 px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-blue-500 hover:text-white transition-all">
        <i class="fas fa-edit mr-1"></i> Modify
      </button>
      <button x-show="isAdmin" @click="deleteItem('Equipment', selectedEquip.EquipmentID)"
        class="glass border-rose-500/20 text-rose-400 px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-xl hover:bg-rose-500 hover:text-white transition-all">
        <i class="fas fa-trash mr-1"></i> Purge
      </button>
    </div>
  </div>

  <!-- Equipment Detail Card -->
  <div class="card-modern p-8 flex flex-col md:flex-row gap-10 relative overflow-hidden" x-show="selectedEquip">
    <div class="absolute top-0 right-0 w-80 h-80 bg-nexus-accent/5 rounded-full blur-3xl -mr-40 -mt-40"></div>
    
    <!-- Equipment Photo -->
    <div class="w-48 h-48 glass rounded-3xl overflow-hidden border-nexus-accent/20 shrink-0 shadow-2xl relative z-10 p-2">
      <img :src="selectedEquip?.FotoURL ? cleanUrl(selectedEquip.FotoURL) : 'https://via.placeholder.com/150?text=No+Data'"
        class="w-full h-full object-cover rounded-2xl">
    </div>
    
    <!-- Equipment Info -->
    <div class="flex-1 z-10">
      <!-- Name and ID -->
      <div class="flex flex-wrap items-center gap-4 mb-4">
        <h2 class="text-4xl font-black text-white tracking-tight nexus-glow-text" x-text="selectedEquip?.Nama"></h2>
        <span class="text-[10px] px-4 py-1.5 rounded-full glass text-nexus-accent font-black border-nexus-accent/20 uppercase tracking-widest" x-text="selectedEquip?.EquipmentID"></span>
      </div>
      <p class="text-nexus-purple font-black mb-8 uppercase text-xs tracking-[0.4em]" x-text="selectedEquip?.Tipe"></p>

      <!-- Metadata Grid -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
        <div>
          <p class="text-nexus-accent/40 text-[9px] uppercase font-black tracking-widest mb-2">Location Sector</p>
          <p class="text-white font-bold text-sm" x-text="selectedEquip?.Lokasi || '-'"></p>
        </div>
        <div>
          <p class="text-nexus-accent/40 text-[9px] uppercase font-black tracking-widest mb-2">Priority Level</p>
          <p :class="critColor(selectedEquip?.Criticality)" class="font-black text-sm uppercase" x-text="selectedEquip?.Criticality || '-'"></p>
        </div>
        <div>
          <p class="text-nexus-accent/40 text-[9px] uppercase font-black tracking-widest mb-2">Serial Signature</p>
          <p class="text-white font-mono text-xs font-bold" x-text="selectedEquip?.SerialNumber || '-'"></p>
        </div>
        <div>
          <p class="text-nexus-accent/40 text-[9px] uppercase font-black tracking-widest mb-2">Vendor Origin</p>
          <p class="text-white font-bold text-sm" x-text="selectedEquip?.Vendor || '-'"></p>
        </div>
      </div>
      
      <!-- Health & Prediction Cards -->
      <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Health Score Card -->
        <div class="p-4 glass border-nexus-accent/5 rounded-2xl flex items-center gap-6">
          <div class="flex-1">
            <p class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-widest mb-2">System Integrity (Health)</p>
            <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
              <div class="h-full transition-all duration-1000" :class="selectedEquip && calculateHealthScore(selectedEquip.EquipmentID).color.replace('text-', 'bg-')" :style="'width: ' + (selectedEquip ? calculateHealthScore(selectedEquip.EquipmentID).score : 100) + '%'"></div>
            </div>
          </div>
          <div class="text-right">
            <p class="font-black text-xl nexus-glow-text" :class="selectedEquip && calculateHealthScore(selectedEquip.EquipmentID).color" x-text="selectedEquip ? calculateHealthScore(selectedEquip.EquipmentID).score + '%' : '100%'"></p>
            <p class="text-[8px] font-black uppercase tracking-widest" :class="selectedEquip && calculateHealthScore(selectedEquip.EquipmentID).color" x-text="selectedEquip ? calculateHealthScore(selectedEquip.EquipmentID).status : 'Optimal'"></p>
          </div>
        </div>
        
        <!-- Neural Prediction Card -->
        <div class="p-4 glass border-nexus-purple/10 rounded-2xl flex items-center gap-6">
          <div class="flex-1">
            <p class="text-[9px] text-nexus-purple/40 uppercase font-black tracking-widest mb-2">Neural Prediction (Failure)</p>
            <p class="text-white font-black text-sm nexus-glow-text" x-text="'EST: ' + (selectedEquip ? predictNextFailure(selectedEquip.EquipmentID) : 'N/A')"></p>
          </div>
          <div class="text-right">
            <p class="text-white font-black text-lg nexus-glow-text" x-text="selectedEquip ? calculateMTBF(selectedEquip.EquipmentID) : '0'"></p>
            <p class="text-[8px] text-slate-500 font-black uppercase tracking-widest">MTBF Hours</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs Navigation -->
  <div class="flex gap-10 border-b border-white/5 px-4">
    <button @click="activeTab = 'hist'"
      :class="activeTab === 'hist' ? 'border-b-2 border-nexus-accent text-nexus-accent' : 'text-slate-500 hover:text-nexus-accent/60'"
      class="pb-5 text-[10px] font-black uppercase tracking-[0.2em] transition-all">Neural Log History</button>
    <button @click="activeTab = 'parts'"
      :class="activeTab === 'parts' ? 'border-b-2 border-nexus-accent text-nexus-accent' : 'text-slate-500 hover:text-nexus-accent/60'"
      class="pb-5 text-[10px] font-black uppercase tracking-[0.2em] transition-all">Integrated Parts</button>
  </div>

  <!-- Tabs Content -->
  <div class="mt-6">
    <!-- 📜 TAB: LOG HISTORY -->
    <div x-show="activeTab === 'hist'" class="space-y-4">
      <template x-for="log in logs.filter(l => l.EquipmentID === selectedEquip?.EquipmentID)" :key="log.LogID">
        <div class="card-modern p-5 border-l-4 relative group" :style="'border-left-color: ' + getStatColor(logColor(log.Jenis))">
          <div class="flex justify-between items-start mb-3">
            <div class="flex items-center gap-3">
              <span class="text-[10px] font-black text-nexus-accent uppercase tracking-widest px-2 py-1 glass rounded-lg" x-text="log.Tanggal"></span>
              <span class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]" x-text="log.Jenis"></span>
            </div>
            <span class="px-3 py-1 rounded-lg text-[8px] font-black uppercase tracking-widest border" :class="logStatusColor(log.Status)" x-text="log.Status || 'Completed'"></span>
          </div>
          <h4 class="text-base font-black text-white mb-2 nexus-glow-text" x-text="log.Deskripsi"></h4>
          <p class="text-[11px] text-slate-400 border-l border-white/10 pl-4 italic" x-text="log.Catatan || 'No technical notes recorded.'"></p>
          
          <div class="mt-4 flex flex-wrap gap-2" x-show="log.PartsUsed && safeParseLogParts(log.PartsUsed).length > 0">
            <template x-for="p in safeParseLogParts(log.PartsUsed)">
              <span class="tag-nexus" x-text="(allParts.find(x => x.PartID === p.id)?.NamaSingkat || p.id) + ' x' + p.qty"></span>
            </template>
          </div>
        </div>
      </template>
      
      <!-- Load More Logs -->
      <div x-show="logsHasMore" class="text-center pt-4">
        <button @click="loadMoreLogs()" :disabled="logsLoadingMore"
          class="btn-nexus-small">
          <i class="fas fa-sync-alt" :class="logsLoadingMore ? 'animate-spin' : ''"></i>
          Load More Logs <span x-text="'(' + logs.length + ' loaded)'"></span>
        </button>
      </div>
      
      <!-- Empty State -->
      <div x-show="logs.filter(l => l.EquipmentID === selectedEquip?.EquipmentID).length === 0" class="text-center py-16 card-modern border-dashed border-2 border-white/5">
        <i class="fas fa-history text-4xl text-slate-700 mb-4 block"></i>
        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">No neural logs recorded for this node</p>
      </div>
    </div>

    <!-- ⚙️ TAB: INTEGRATED PARTS -->
    <div x-show="activeTab === 'parts'" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <template x-for="p in allParts.filter(part => (part.EquipmentIDs && part.EquipmentIDs.includes(selectedEquip?.EquipmentID)) || part.EquipmentID === selectedEquip?.EquipmentID)" :key="p.PartID">
        <div class="card-modern p-5 flex justify-between items-center group hover:border-nexus-accent/40 transition-all">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl glass flex items-center justify-center text-nexus-accent group-hover:scale-110 transition-transform">
              <i class="fas fa-cog"></i>
            </div>
            <div>
              <h4 class="text-sm font-black text-white uppercase tracking-tight" x-text="p.NamaPart"></h4>
              <p class="text-[10px] text-nexus-accent/60 font-mono font-bold" x-text="p.PartID"></p>
            </div>
          </div>
          <div class="text-right">
            <p class="text-[9px] text-slate-500 uppercase font-black mb-1 tracking-widest">In Stock</p>
            <p class="text-2xl font-black nexus-glow-text" :class="isLowStock(p.Stok, p.MinStock) ? 'text-rose-500' : 'text-nexus-accent'" x-text="p.Stok"></p>
          </div>
        </div>
      </template>
      
      <!-- Empty State -->
      <div x-show="allParts.filter(part => (part.EquipmentIDs && part.EquipmentIDs.includes(selectedEquip?.EquipmentID)) || part.EquipmentID === selectedEquip?.EquipmentID).length === 0" class="col-span-full text-center py-16 card-modern border-dashed border-2 border-white/5">
        <i class="fas fa-microchip text-4xl text-slate-700 mb-4 block"></i>
        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">No integrated parts detected for this node</p>
      </div>
    </div>
  </div>
</div>
