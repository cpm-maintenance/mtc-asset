<!-- 📅 PAGE: PM SCHEDULE — Task List, Calendar & Gantt -->
<div x-cloak class="space-y-4">
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
    <div>
      <h3 class="font-black text-xl lg:text-2xl text-amber-400 nexus-glow-text uppercase tracking-tight">PM Schedule</h3>
      <p class="text-slate-500 text-xs mt-1 font-bold uppercase tracking-widest">Preventive Maintenance Task Planner</p>
    </div>
    <div class="flex flex-wrap gap-2 items-center">
      <!-- 3-Way View Toggle -->
      <div class="flex glass rounded-xl p-1 border-nexus-accent/10">
        <button @click="pmView = 'list'" 
          :class="pmView === 'list' ? 'bg-cyan-500/20 text-amber-400 border-amber-500/30' : 'text-slate-500 hover:text-slate-300'"
          class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all border border-transparent flex items-center gap-2">
          <i class="fas fa-list"></i> <span class="hidden sm:inline">Tasks</span>
        </button>
        <button @click="pmView = 'calendar'" 
          :class="pmView === 'calendar' ? 'bg-cyan-500/20 text-amber-400 border-amber-500/30' : 'text-slate-500 hover:text-slate-300'"
          class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all border border-transparent flex items-center gap-2">
          <i class="fas fa-calendar-alt"></i> <span class="hidden sm:inline">Calendar</span>
        </button>
        <button @click="pmView = 'gantt'" 
          :class="pmView === 'gantt' ? 'bg-cyan-500/20 text-amber-400 border-amber-500/30' : 'text-slate-500 hover:text-slate-300'"
          class="px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all border border-transparent flex items-center gap-2">
          <i class="fas fa-chart-bar"></i> <span class="hidden sm:inline">Gantt</span>
        </button>
      </div>
      <button @click="openPMModal(false)" x-show="isAdminOrSupervisor"
        class="px-4 py-2 bg-amber-600/20 border border-amber-500/30 text-amber-400 rounded-xl text-xs font-bold hover:bg-amber-500/30 transition-all flex items-center gap-2">
        <i class="fas fa-plus"></i> New PM Task
      </button>
      <button @click="loadPMSchedule()" class="w-9 h-9 rounded-xl glass flex items-center justify-center text-slate-400 hover:text-amber-400 transition-all">
        <i class="fas fa-sync-alt text-xs"></i>
      </button>
      <button @click="exportPMSchedulePDF()" :disabled="!pmList || pmList.length === 0"
        class="px-4 py-2 bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 rounded-xl text-xs font-bold hover:bg-emerald-500/30 transition-all flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed">
        <i class="fas fa-file-pdf text-xs"></i> <span class="hidden sm:inline">Export PDF</span>
      </button>
    </div>
  </div>

  <!-- Statistics Cards -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <div class="glass border-nexus-accent/10 p-4 text-center border-l-2 border-red-500">
      <div class="text-xl md:text-2xl font-black text-red-500" x-text="pmGetStats().overdue"></div>
      <div class="text-xs text-slate-500 uppercase tracking-widest">Overdue</div>
    </div>
    <div class="glass border-nexus-accent/10 p-4 text-center border-l-2 border-orange-500">
      <div class="text-xl md:text-2xl font-black text-orange-500" x-text="pmGetStats().dueThisMonth"></div>
      <div class="text-xs text-slate-500 uppercase tracking-widest">Due This Month</div>
    </div>
    <div class="glass border-nexus-accent/10 p-4 text-center border-l-2 border-cyan-500">
      <div class="text-xl md:text-2xl font-black text-cyan-500" x-text="pmGetStats().upcoming"></div>
      <div class="text-xs text-slate-500 uppercase tracking-widest">Upcoming (30d)</div>
    </div>
    <div class="glass border-nexus-accent/10 p-4 text-center border-l-2 border-emerald-500">
      <div class="text-xl md:text-2xl font-black text-emerald-500" x-text="pmGetStats().completed"></div>
      <div class="text-xs text-slate-500 uppercase tracking-widest">Completed</div>
    </div>
  </div>

  <!-- Shared Filters -->
  <div class="flex flex-wrap items-center gap-3">
    <select x-model="pmFilterEquip" class="p-3 glass border-nexus-accent/10 text-xs font-bold max-w-[200px]">
      <option value="">All Equipment</option>
      <template x-for="e in equipment" :key="e.EquipmentID">
        <option :value="e.EquipmentID" x-text="(e.Nama || e.EquipmentID)"></option>
      </template>
    </select>
    <select x-model="pmFilterStatus" class="p-3 glass border-nexus-accent/10 text-xs font-bold max-w-[150px]">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="completed">Completed</option>
      <option value="cancelled">Cancelled</option>
    </select>
  </div>

  <!-- Loading (Skeleton) -->
  <div x-show="pmLoading" class="space-y-4">
    <div class="grid grid-cols-1 gap-3">
      <template x-for="i in 5" :key="i">
        <div class="skeleton skeleton-card p-4">
          <div class="flex items-center gap-4">
            <div class="skeleton skeleton-circle" style="width:40px;height:40px"></div>
            <div class="flex-1 space-y-2">
              <div class="skeleton skeleton-line skeleton-md"></div>
              <div class="skeleton skeleton-line skeleton-sm" style="width:50%"></div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ════════════════════════════════════════════ -->
  <!-- TAB 1: TASK LIST (Full Table) -->
  <!-- ════════════════════════════════════════════ -->
  <div x-show="!pmLoading && pmView === 'list'">
    <div class="glass border-nexus-accent/10 rounded-2xl overflow-hidden">
      <!-- Header row (desktop) -->
      <div class="hidden md:grid md:grid-cols-[24px_minmax(0,3fr)_minmax(0,1.5fr)_minmax(0,2fr)_auto] gap-3 p-3 border-b border-white/5 text-xs font-black uppercase tracking-widest text-slate-500 items-center">
        <div class="flex items-center">
          <input type="checkbox" @click="pmToggleSelectAll()"
            :checked="pmGetFilteredList().filter(p=>p.status==='pending').length > 0 && pmGetFilteredList().filter(p=>p.status==='pending').every(p => pmSelectedIds.includes(p.pmId))"
            class="accent-cyan-500 w-3.5 h-3.5 cursor-pointer">
        </div>
        <div class="flex items-center gap-3">
          <span class="w-6"></span>
          <span>Task</span>
        </div>
        <div>Equipment</div>
        <div class="grid grid-cols-2 gap-2">
          <span>Schedule</span>
          <span>Status</span>
        </div>
        <div class="text-right">Action</div>
      </div>
      <!-- Rows -->
      <div class="divide-y divide-white/5">
        <template x-for="pm in pmGetFilteredList()" :key="pm.pmId">
          <div>
            <!-- Mobile: card style -->
            <div class="block md:hidden p-3 hover:bg-white/[0.02] cursor-pointer transition-all"
              @click="selectedPM = pm; pmShowDetail = true">
              <div class="flex items-start gap-3">
                <div @click.stop class="mt-1">
                  <input type="checkbox" :checked="pmSelectedIds.includes(pm.pmId)" @click="pmToggleSelect(pm.pmId)"
                    x-show="pm.status === 'pending'" class="accent-cyan-500 w-4 h-4 cursor-pointer">
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <div class="w-5 h-5 rounded flex items-center justify-center shrink-0" :class="{
                      'bg-red-500/20': pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0],
                      'bg-cyan-500/20': pm.status === 'pending',
                      'bg-emerald-500/20': pm.status === 'completed',
                      'bg-slate-500/20': pm.status === 'cancelled',
                    }">
                      <i class="fas text-xs" :class="{
                        'fa-exclamation-triangle text-red-400': pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0],
                        'fa-clock text-amber-400': pm.status === 'pending',
                        'fa-check text-emerald-400': pm.status === 'completed',
                        'fa-ban text-slate-400': pm.status === 'cancelled',
                      }"></i>
                    </div>
                    <span class="text-sm font-bold text-white truncate" x-text="pm.taskName"></span>
                  </div>
                  <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
                    <span class="text-sm text-cyan-300 font-semibold truncate" x-text="equipment.find(e => e.EquipmentID === pm.equipmentId)?.Nama || pm.equipmentId"></span>
                    <span class="text-xs text-slate-600 font-mono" x-text="pm.equipmentId"></span>
                    <span x-show="allParts.some(p => ((p.EquipmentIDs && p.EquipmentIDs.includes(pm.equipmentId)) || p.EquipmentID === pm.equipmentId) && isLowStock(p.Stok, p.MinStock))"
                      class="text-xs font-black bg-rose-500/20 text-rose-400 px-1.5 py-0.5 rounded flex items-center gap-1">
                      <i class="fas fa-exclamation-triangle"></i> LOW STOCK
                    </span>
                  </div>
                  <div class="flex flex-wrap items-center gap-1.5 mt-1">
                    <span class="text-xs text-slate-400" x-text="pm.date"></span>
                    <span class="text-slate-600">·</span>
                    <span class="text-sm px-2 py-0.5 rounded-full font-bold" :class="{
                      'bg-red-500/20 text-red-400': pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0],
                      'bg-cyan-500/20 text-amber-400': pm.status === 'pending',
                      'bg-emerald-500/20 text-emerald-400': pm.status === 'completed',
                      'bg-slate-500/20 text-slate-400': pm.status === 'cancelled',
                    }" x-text="pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0] ? 'Overdue' : pm.status"></span>
                    <span class="text-sm px-2 py-0.5 rounded-full font-bold" :class="{
                      'bg-red-500/20 text-red-400': pm.priority === 'High',
                      'bg-yellow-500/20 text-yellow-400': pm.priority === 'Medium',
                      'bg-slate-500/20 text-slate-400': pm.priority === 'Low',
                    }" x-text="pm.priority || 'Medium'"></span>
                    <span x-show="pm.frequency !== 'none'" class="text-sm px-2 py-0.5 rounded-full bg-purple-500/20 text-purple-400 font-bold" x-text="pm.frequency"></span>
                  </div>
                </div>
                <div class="flex flex-col gap-1 shrink-0" @click.stop>
                  <button x-show="pm.status === 'pending'"
                    @click="logPMFromSchedule(pm)" class="w-7 h-7 rounded-lg bg-amber-600/20 border border-amber-500/30 flex items-center justify-center text-amber-400 hover:bg-amber-500/30 transition-all" title="Complete & Log PM">
                    <i class="fas fa-clipboard-check text-sm"></i>
                  </button>
                  <button x-show="isAdminOrSupervisor"
                    @click="openPMModal(true, pm); $event.stopPropagation()" class="w-7 h-7 rounded-lg bg-slate-600/20 border border-slate-500/30 flex items-center justify-center text-slate-400 hover:text-amber-400 transition-all" title="Edit">
                    <i class="fas fa-pen text-sm"></i>
                  </button>
                </div>
              </div>
            </div>

            <!-- Desktop: grid row -->
            <div @click="selectedPM = pm; pmShowDetail = true"
              class="hidden md:grid md:grid-cols-[24px_minmax(0,3fr)_minmax(0,1.5fr)_minmax(0,2fr)_auto] gap-3 p-3 items-center hover:bg-white/[0.02] cursor-pointer transition-all group">
              <!-- Checkbox -->
              <div @click.stop class="flex items-center">
                <input type="checkbox" :checked="pmSelectedIds.includes(pm.pmId)" @click="pmToggleSelect(pm.pmId)"
                  x-show="pm.status === 'pending'" class="accent-cyan-500 w-3.5 h-3.5 cursor-pointer">
              </div>
              <!-- Task -->
              <div class="min-w-0 grid grid-cols-[auto_1fr] gap-3 items-center">
                <div class="w-6 h-6 rounded-lg flex items-center justify-center shrink-0" :class="{
                  'bg-red-500/20': pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0],
                  'bg-cyan-500/20': pm.status === 'pending',
                  'bg-emerald-500/20': pm.status === 'completed',
                  'bg-slate-500/20': pm.status === 'cancelled',
                }">
                  <i class="fas text-sm" :class="{
                    'fa-exclamation-triangle text-red-400': pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0],
                    'fa-clock text-amber-400': pm.status === 'pending',
                    'fa-check text-emerald-400': pm.status === 'completed',
                    'fa-ban text-slate-400': pm.status === 'cancelled',
                  }"></i>
                </div>
                <div class="min-w-0">
                  <span class="text-sm font-bold text-white truncate block" x-text="pm.taskName"></span>
                </div>
              </div>
              <!-- Equipment name + ID -->
              <div class="min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="text-xs font-bold text-cyan-300 truncate" x-text="(equipment.find(e => e.EquipmentID === pm.equipmentId)?.Nama || pm.equipmentId)"></span>
                  <span x-show="allParts.some(p => ((p.EquipmentIDs && p.EquipmentIDs.includes(pm.equipmentId)) || p.EquipmentID === pm.equipmentId) && isLowStock(p.Stok, p.MinStock))"
                    class="text-xs font-black bg-rose-500/20 text-rose-400 px-1.5 py-0.5 rounded flex items-center gap-1"
                    title="Linked spare parts are low in stock!">
                    <i class="fas fa-exclamation-triangle"></i> LOW STOCK
                  </span>
                </div>
                <span class="text-sm text-slate-600 font-mono block" x-text="pm.equipmentId"></span>
              </div>
              <!-- Schedule + Status (2 sub-columns) -->
              <div class="grid grid-cols-2 gap-2 min-w-0">
                <div>
                  <span class="text-xs font-bold" :class="{
                    'text-red-400': pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0],
                    'text-white': pm.status === 'pending',
                    'text-emerald-400': pm.status === 'completed',
                  }" x-text="pm.date"></span>
                  <div class="flex items-center gap-1 mt-0.5 flex-wrap">
                    <span x-show="pm.frequency !== 'none'" class="text-xs px-1.5 py-0.5 rounded bg-purple-500/20 text-purple-400 font-bold uppercase" x-text="pm.frequency"></span>
                    <span class="text-xs px-1.5 py-0.5 rounded font-bold uppercase" :class="{
                      'bg-yellow-500/20 text-yellow-400': pm.priority === 'Medium',
                      'bg-red-500/20 text-red-400': pm.priority === 'High',
                      'bg-slate-500/20 text-slate-400': pm.priority === 'Low',
                    }" x-text="pm.priority || 'Medium'"></span>
                  </div>
                </div>
                <div>
                  <span class="text-sm px-2.5 py-1 rounded-full font-bold inline-block" :class="{
                    'bg-red-500/20 text-red-400': pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0],
                    'bg-cyan-500/20 text-amber-400': pm.status === 'pending',
                    'bg-emerald-500/20 text-emerald-400': pm.status === 'completed',
                    'bg-slate-500/20 text-slate-400': pm.status === 'cancelled',
                  }" x-text="pm.status === 'pending' && pm.date < new Date().toISOString().split('T')[0] ? 'Overdue' : pm.status"></span>
                </div>
              </div>
              <div class="flex gap-1 justify-end opacity-0 group-hover:opacity-100 transition-opacity" @click.stop>
                <button x-show="pm.status === 'pending'"
                  @click="logPMFromSchedule(pm)" class="w-7 h-7 rounded-lg bg-amber-600/20 border border-amber-500/30 flex items-center justify-center text-amber-400 hover:bg-amber-500/30 transition-all" title="Complete & Log PM">
                  <i class="fas fa-clipboard-check text-sm"></i>
                </button>
                <button x-show="isAdminOrSupervisor"
                  @click="openPMModal(true, pm); $event.stopPropagation()" class="w-7 h-7 rounded-lg bg-slate-600/20 border border-slate-500/30 flex items-center justify-center text-slate-400 hover:text-amber-400 transition-all" title="Edit">
                  <i class="fas fa-pen text-sm"></i>
                </button>
                <button x-show="isAdminOrSupervisor"
                  @click="deletePM(pm.pmId)" class="w-7 h-7 rounded-lg bg-red-600/20 border border-red-500/30 flex items-center justify-center text-red-400 hover:bg-red-500/30 transition-all" title="Delete">
                  <i class="fas fa-trash text-sm"></i>
                </button>
              </div>
            </div>
          </div>
        </template>
        <!-- Empty state -->
        <div x-show="pmGetFilteredList().length === 0" class="text-center py-16 text-slate-500">
          <i class="fas fa-clipboard-list text-5xl text-slate-700 mb-4 block"></i>
          <p class="font-bold text-base">No PM Tasks Found</p>
          <p class="text-sm mt-1">Click <span class="text-amber-400 font-bold">+ New PM Task</span> to create one</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bulk action bar -->
  <div x-show="pmSelectedIds.length > 0" class="mt-3 flex items-center gap-3 p-3 glass border-amber-500/30 rounded-xl">
    <span class="text-xs font-bold text-amber-400" x-text="pmSelectedIds.length + ' task(s) selected'"></span>
    <button @click="bulkCompletePM()" class="px-4 py-2 bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 rounded-xl text-xs font-bold hover:bg-emerald-500/30 transition-all flex items-center gap-2">
      <i class="fas fa-check"></i> Complete All
    </button>
    <button @click="pmSelectedIds = []" class="px-4 py-2 glass text-slate-400 rounded-xl text-xs font-bold hover:text-white transition-all">
      Cancel
    </button>
  </div>

  <!-- ════════════════════════════════════════════ -->
  <!-- TAB 2: CALENDAR VIEW -->
  <!-- ════════════════════════════════════════════ -->
  <div x-show="!pmLoading && pmView === 'calendar'">
    <!-- Month Navigation -->
    <div class="flex items-center gap-3 mb-4">
      <button @click="pmMonthOffset--" class="w-9 h-9 rounded-xl glass flex items-center justify-center text-slate-400 hover:text-amber-400 transition-all">
        <i class="fas fa-chevron-left text-xs"></i>
      </button>
      <h4 class="text-lg font-black text-white min-w-[200px] text-center" x-text="pmGetMonthLabel()"></h4>
      <button @click="pmMonthOffset++" class="w-9 h-9 rounded-xl glass flex items-center justify-center text-slate-400 hover:text-amber-400 transition-all">
        <i class="fas fa-chevron-right text-xs"></i>
      </button>
      <button @click="pmMonthOffset = 0" class="px-3 py-2 rounded-xl glass text-xs font-bold text-amber-400 hover:bg-amber-500/10 transition-all">
        Today
      </button>
    </div>

    <div class="glass border-nexus-accent/10 rounded-2xl overflow-hidden">
      <!-- Day Headers -->
      <div class="grid grid-cols-7 border-b border-white/5">
        <template x-for="day in ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']" :key="day">
          <div class="p-2 md:p-3 text-center text-xs md:text-xs font-black uppercase tracking-widest text-slate-500 border-r border-white/5 last:border-r-0">
            <span class="hidden md:inline" x-text="day"></span>
            <span class="md:hidden" x-text="day.substring(0,1)"></span>
          </div>
        </template>
      </div>
      <!-- Days -->
      <div class="grid grid-cols-7">
        <template x-for="(day, idx) in pmGetCalendarDays()" :key="idx">
          <div 
            :class="{
              'bg-cyan-500/5': day.isToday && !day.isOtherMonth,
              'bg-slate-800/50': day.isOtherMonth,
              'border-amber-500/30': day.isToday && !day.isOtherMonth,
            }"
            class="min-h-[60px] md:min-h-[100px] p-1 md:p-2 border-b border-r border-white/5 relative group">
            <div class="flex items-center justify-between mb-1">
              <span 
                :class="{
                  'text-white font-black': !day.isOtherMonth,
                  'text-slate-600': day.isOtherMonth,
                  'w-6 h-6 rounded-full bg-cyan-500 flex items-center justify-center text-xs': day.isToday,
                  'text-xs': !day.isToday
                }"
                x-text="day.date.getDate()">
              </span>
              <div x-show="day.events.length > 0" class="flex -space-x-1">
                <template x-for="(evt, eidx) in day.events.slice(0, 5)" :key="eidx">
                  <div class="w-2 h-2 rounded-full" :class="{
                    'bg-red-500': evt.isOverdue,
                    'bg-orange-500': evt.isDueSoon,
                    'bg-emerald-500': evt.isCompleted,
                    'bg-cyan-500': !evt.isOverdue && !evt.isDueSoon && !evt.isCompleted
                  }"></div>
                </template>
                <span x-show="day.events.length > 5" class="text-[6px] text-slate-500 -ml-1">+</span>
              </div>
            </div>
            <div class="space-y-0.5">
              <template x-for="evt in day.events.slice(0, 3)" :key="evt.id">
                <div @click="selectedPM = pmList.find(p => p.pmId === evt.id); pmShowDetail = true"
                  :class="{
                    'bg-red-500/20 border-red-500/40 text-red-400': evt.isOverdue,
                    'bg-orange-500/20 border-orange-500/40 text-orange-400': evt.isDueSoon,
                    'bg-emerald-500/20 border-emerald-500/40 text-emerald-400 line-through': evt.isCompleted,
                    'bg-amber-500/10 border-cyan-500/20 text-amber-400': !evt.isOverdue && !evt.isDueSoon && !evt.isCompleted
                  }"
                  class="px-1 py-0.5 rounded border text-[6px] md:text-xs font-bold truncate cursor-pointer hover:brightness-125 transition-all leading-tight"
                  x-text="evt.name">
                </div>
              </template>
              <div x-show="day.events.length > 3"
                @click="pmMonthOffset = 0; pmFilterEquip = ''; pmFilterStatus = ''"
                class="text-[6px] md:text-xs text-cyan-500/60 font-bold cursor-pointer hover:text-amber-400 text-center">
                <span x-text="`+${day.events.length - 3} more`"></span>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
    <!-- Legend -->
    <div class="flex flex-wrap gap-4 mt-3 text-sm font-bold uppercase tracking-widest">
      <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-red-500/30 border border-red-500/50"></div><span class="text-slate-500">Overdue</span></div>
      <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-orange-500/30 border border-orange-500/50"></div><span class="text-slate-500">Due Soon (7d)</span></div>
      <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-cyan-500/20 border border-amber-500/30"></div><span class="text-slate-500">Scheduled</span></div>
      <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-emerald-500/30 border border-emerald-500/50"></div><span class="text-slate-500">Completed</span></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════ -->
  <!-- TAB 3: GANTT CHART -->
  <!-- ════════════════════════════════════════════ -->
  <div x-show="!pmLoading && pmView === 'gantt'" class="space-y-4">
    <div class="flex items-center gap-2 overflow-x-auto pb-2">
      <template x-for="(m, idx) in pmGetGanttMonths()" :key="idx">
        <button @click="pmGanttScroll = idx"
          :class="pmGanttScroll === idx ? 'bg-cyan-500/20 text-amber-400 border-amber-500/30' : 'text-slate-500 border-transparent hover:text-slate-300'"
          class="px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest border glass whitespace-nowrap transition-all">
          <span x-text="m.label"></span>
        </button>
      </template>
    </div>

    <div class="glass border-nexus-accent/10 rounded-2xl overflow-hidden">
      <div class="overflow-x-auto">
        <div class="min-w-[800px]">
          <!-- Header -->
          <div class="flex border-b border-white/5">
            <div class="w-[200px] shrink-0 p-3 border-r border-white/5">
              <span class="text-xs font-black uppercase tracking-widest text-slate-500">Equipment / Task</span>
            </div>
            <div class="flex flex-1">
              <template x-for="day in pmGetGanttDays()" :key="day.dateStr">
                <div 
                  :class="{'bg-cyan-500/5': day.isToday, 'bg-slate-800/30': day.isWeekend && !day.isToday, 'border-white/5': true}"
                  class="w-[20px] shrink-0 border-r text-center py-2" :title="day.label">
                  <div class="text-[6px] font-black uppercase text-slate-500" x-text="day.dayName"></div>
                  <div class="text-xs font-bold" :class="day.isToday ? 'text-amber-400' : 'text-slate-400'" x-text="day.date"></div>
                </div>
              </template>
            </div>
          </div>
          <!-- Rows -->
          <template x-for="(row, rIdx) in pmGetGanttRows()" :key="row.equipId">
            <div class="flex border-b border-white/5 last:border-b-0 hover:bg-white/[0.02] transition-colors">
              <div class="w-[200px] shrink-0 p-3 border-r border-white/5 flex flex-col justify-center">
                <div class="flex items-center gap-2">
                  <span class="w-2 h-2 rounded-full" :class="{
                    'bg-red-500': row.status === 'Overdue',
                    'bg-orange-500': row.status === 'Due Soon',
                    'bg-emerald-500': row.status === 'Completed',
                    'bg-cyan-500': row.status === 'Scheduled'
                  }"></span>
                  <span class="text-xs font-bold text-white truncate" x-text="row.name"></span>
                </div>
                <span class="text-xs text-slate-500 mt-0.5 font-mono" x-text="row.equipId"></span>
              </div>
              <div class="flex flex-1 relative">
                <template x-for="day in pmGetGanttDays()" :key="day.dateStr">
                  <div class="w-[20px] shrink-0 border-r border-white/5 relative"
                    :class="{'bg-cyan-500/[0.03]': day.isToday, 'bg-slate-800/20': day.isWeekend}"></div>
                </template>
                <template x-for="evt in row.events" :key="evt.id">
                  <div @click="selectedPM = pmList.find(p => p.pmId === evt.id); pmShowDetail = true"
                    :style="`left: ${evt.left}px; width: ${evt.width}px;`"
                    :class="{
                      'bg-red-500/40 border-red-500/60 hover:bg-red-500/50': evt.isOverdue,
                      'bg-orange-500/40 border-orange-500/60 hover:bg-orange-500/50': evt.isDueSoon,
                      'bg-cyan-500/40 border-cyan-500/60 hover:bg-cyan-500/50': !evt.isOverdue && !evt.isDueSoon && !evt.isCompleted,
                      'bg-emerald-500/40 border-emerald-500/60': evt.isCompleted,
                    }"
                    class="absolute top-1/2 -translate-y-1/2 h-5 rounded border cursor-pointer transition-all group z-10"
                    :title="evt.tooltip">
                    <div class="px-1 text-[6px] font-bold text-white truncate leading-5 opacity-0 group-hover:opacity-100 transition-opacity" x-text="evt.name"></div>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <!-- Empty -->
          <div x-show="pmGetGanttRows().length === 0" class="text-center py-16 text-slate-500">
            <i class="fas fa-chart-bar text-5xl text-slate-700 mb-4 block"></i>
            <p class="font-bold">No PM Tasks in this Range</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════ -->
  <!-- CRUD MODAL -->
  <!-- ════════════════════════════════════════════ -->
  <div x-show="showPMModal" x-cloak class="fixed inset-0 z-[300] bg-nexus-black/90 backdrop-blur-sm flex items-center justify-center p-4"
    @click.self="showPMModal = false">
    <div x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      class="w-full max-w-lg card-modern p-6 border-amber-500/30 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-black text-white nexus-glow-text flex items-center gap-3">
          <i class="fas fa-tasks text-amber-400"></i>
          <span x-text="isEditingPM ? 'Edit PM Task' : 'New PM Task'"></span>
        </h3>
        <button @click="showPMModal = false" class="w-8 h-8 rounded-lg bg-white/5 text-slate-400 hover:text-white flex items-center justify-center">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form @submit.prevent="submitPM()" class="space-y-4">
        <div>
          <label class="text-sm text-slate-500 font-black uppercase tracking-widest mb-1 block">Task Name *</label>
          <input type="text" x-model="pmForm.taskName" placeholder="e.g. Ganti Oli, Greasing, Inspect Belt..."
            class="w-full p-3 glass border-nexus-accent/10 text-xs font-bold text-white placeholder-slate-600 rounded-xl focus:border-cyan-500/50 outline-none transition-all">
        </div>
        <div>
          <label class="text-sm text-slate-500 font-black uppercase tracking-widest mb-1 block">Equipment *</label>
          <select x-model="pmForm.equipmentId" class="w-full p-3 glass border-nexus-accent/10 text-xs font-bold rounded-xl">
            <option value="">Select Equipment</option>
            <template x-for="e in equipment" :key="e.EquipmentID">
              <option :value="e.EquipmentID" x-text="e.Nama || e.EquipmentID"></option>
            </template>
          </select>
        </div>
        <div>
          <label class="text-sm text-slate-500 font-black uppercase tracking-widest mb-1 block">Description</label>
          <textarea x-model="pmForm.description" rows="2"
            class="w-full p-3 glass border-nexus-accent/10 text-xs font-bold text-white placeholder-slate-600 rounded-xl focus:border-cyan-500/50 outline-none transition-all resize-none"
            placeholder="Optional notes..."></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm text-slate-500 font-black uppercase tracking-widest mb-1 block">PM Date *</label>
            <input type="date" x-model="pmForm.date" class="w-full p-3 glass border-nexus-accent/10 text-xs font-bold rounded-xl">
          </div>
          <div>
            <label class="text-sm text-slate-500 font-black uppercase tracking-widest mb-1 block">Repeat</label>
            <select x-model="pmForm.frequency" class="w-full p-3 glass border-nexus-accent/10 text-xs font-bold rounded-xl">
              <option value="none">No Repeat</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="quarterly">Quarterly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm text-slate-500 font-black uppercase tracking-widest mb-1 block">Priority</label>
            <select x-model="pmForm.priority" class="w-full p-3 glass border-nexus-accent/10 text-xs font-bold rounded-xl">
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div>
            <label class="text-sm text-slate-500 font-black uppercase tracking-widest mb-1 block">Assigned To</label>
            <input type="text" x-model="pmForm.assignedTo" class="w-full p-3 glass border-nexus-accent/10 text-xs font-bold rounded-xl">
          </div>
        </div>
        <div class="flex gap-2 pt-2">
          <button type="button" @click="showPMModal = false" class="flex-1 px-4 py-3 glass text-slate-400 rounded-xl text-xs font-bold hover:text-white transition-all">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-3 bg-amber-600/20 border border-amber-500/30 text-amber-400 rounded-xl text-xs font-bold hover:bg-amber-500/30 transition-all">
            <i class="fas fa-save mr-2"></i> Save PM Task
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ════════════════════════════════════════════ -->
  <!-- DETAIL MODAL -->
  <!-- ════════════════════════════════════════════ -->
  <div x-show="pmShowDetail" x-cloak class="fixed inset-0 z-[300] bg-nexus-black/90 backdrop-blur-sm flex items-center justify-center p-4"
    @click.self="pmShowDetail = false">
    <div x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      class="w-full max-w-lg card-modern p-6 border-amber-500/30">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-black text-white nexus-glow-text flex items-center gap-3">
          <i class="fas fa-tasks text-amber-400"></i>
          PM Task Detail
        </h3>
        <button @click="pmShowDetail = false" class="w-8 h-8 rounded-lg bg-white/5 text-slate-400 hover:text-white flex items-center justify-center">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <template x-if="selectedPM">
        <div class="space-y-4">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center" :class="{
              'bg-red-500/20': selectedPM.status === 'pending' && selectedPM.date < new Date().toISOString().split('T')[0],
              'bg-cyan-500/20': selectedPM.status === 'pending',
              'bg-emerald-500/20': selectedPM.status === 'completed',
            }">
              <i class="fas fa-calendar-check text-xl" :class="{
                'text-red-400': selectedPM.status === 'pending' && selectedPM.date < new Date().toISOString().split('T')[0],
                'text-amber-400': selectedPM.status === 'pending',
                'text-emerald-400': selectedPM.status === 'completed',
              }"></i>
            </div>
            <div>
              <h4 class="font-black text-white" x-text="selectedPM.taskName"></h4>
              <p class="text-slate-400 text-sm" x-text="selectedPM.equipmentId"></p>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-slate-800/50 p-3 rounded-xl">
              <p class="text-xs text-slate-500 uppercase font-black tracking-widest">Date</p>
              <p class="text-white font-bold text-sm" x-text="selectedPM.date"></p>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-xl">
              <p class="text-xs text-slate-500 uppercase font-black tracking-widest">Status</p>
              <p class="text-sm font-bold" :class="{
                'text-red-400': selectedPM.status === 'pending' && selectedPM.date < new Date().toISOString().split('T')[0],
                'text-amber-400': selectedPM.status === 'pending',
                'text-emerald-400': selectedPM.status === 'completed',
                'text-slate-400': selectedPM.status === 'cancelled',
              }" x-text="selectedPM.status === 'pending' && selectedPM.date < new Date().toISOString().split('T')[0] ? 'Overdue' : selectedPM.status"></p>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-xl">
              <p class="text-xs text-slate-500 uppercase font-black tracking-widest">Priority</p>
              <p class="text-white font-bold text-sm" x-text="selectedPM.priority || 'Medium'"></p>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-xl">
              <p class="text-xs text-slate-500 uppercase font-black tracking-widest">Repeat</p>
              <p class="text-white font-bold text-sm capitalize" x-text="selectedPM.frequency || 'None'"></p>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-xl">
              <p class="text-xs text-slate-500 uppercase font-black tracking-widest">Assigned To</p>
              <p class="text-white font-bold text-sm" x-text="selectedPM.assignedTo || 'Maintenance Team'"></p>
            </div>
            <div class="bg-slate-800/50 p-3 rounded-xl" x-show="selectedPM.completionDate">
              <p class="text-xs text-slate-500 uppercase font-black tracking-widest">Completed At</p>
              <p class="text-emerald-400 font-bold text-sm" x-text="selectedPM.completionDate"></p>
            </div>
          </div>
          <div x-show="selectedPM.description" class="bg-slate-800/50 p-3 rounded-xl">
            <p class="text-xs text-slate-500 uppercase font-black tracking-widest mb-1">Description</p>
            <p class="text-white text-sm" x-text="selectedPM.description"></p>
          </div>
          <!-- BOM / Parts Stock Status -->
          <div class="bg-slate-800/50 p-3 rounded-xl space-y-2">
            <p class="text-xs text-slate-500 uppercase font-black tracking-widest mb-1">BOM Stock Status</p>
            <div class="space-y-1">
              <template x-for="p in allParts.filter(part => (part.EquipmentIDs && part.EquipmentIDs.includes(selectedPM.equipmentId)) || part.EquipmentID === selectedPM.equipmentId)" :key="p.PartID">
                <div class="flex justify-between items-center text-sm p-1.5 rounded-lg bg-black/20">
                  <div class="flex items-center gap-2">
                    <i class="fas fa-cog text-xs" :class="isLowStock(p.Stok, p.MinStock) ? 'text-rose-400' : 'text-amber-400'"></i>
                    <span class="text-white font-bold" x-text="p.NamaPart"></span>
                    <span class="text-sm text-slate-500 font-mono" x-text="'(' + p.PartID + ')'"></span>
                  </div>
                  <div class="flex items-center gap-1.5">
                    <span class="font-bold" :class="isLowStock(p.Stok, p.MinStock) ? 'text-rose-400' : 'text-emerald-400'" x-text="'Stok: ' + p.Stok + '/' + p.MinStock"></span>
                    <span x-show="isLowStock(p.Stok, p.MinStock)" class="text-xs font-black uppercase bg-rose-500/20 text-rose-400 px-1.5 py-0.5 rounded-full">Low Stock</span>
                  </div>
                </div>
              </template>
              <div x-show="allParts.filter(part => (part.EquipmentIDs && part.EquipmentIDs.includes(selectedPM.equipmentId)) || part.EquipmentID === selectedPM.equipmentId).length === 0" class="text-xs text-slate-500 italic">
                No spare parts registered for this equipment (BOM empty).
              </div>
            </div>
          </div>
          <div class="flex gap-2 pt-2">
            <button @click="openPMModal(true, selectedPM); pmShowDetail = false" x-show="isAdminOrSupervisor"
              class="flex-1 px-4 py-3 bg-slate-600/20 border border-slate-500/30 text-slate-400 rounded-xl text-xs font-bold hover:bg-slate-500/30 transition-all">
              <i class="fas fa-edit mr-2"></i> Edit
            </button>
            <button x-show="selectedPM.status === 'pending'"
              @click="logPMFromSchedule(selectedPM); pmShowDetail = false"
              class="flex-1 px-4 py-3 bg-amber-600/20 border border-amber-500/30 text-amber-400 rounded-xl text-xs font-bold hover:bg-amber-500/30 transition-all">
              <i class="fas fa-clipboard-check mr-2"></i> Complete & Log PM
            </button>
            <button x-show="selectedPM.status === 'pending'"
              @click="selectedPM.status = 'completed'; selectedPM.completionDate = new Date().toISOString().split('T')[0]; completePM(selectedPM.pmId)"
              class="flex-1 px-4 py-3 bg-emerald-600/20 border border-emerald-500/30 text-emerald-400 rounded-xl text-xs font-bold hover:bg-emerald-500/30 transition-all">
              <i class="fas fa-check mr-2"></i> Mark Complete
            </button>
            <button @click="deletePM(selectedPM.pmId)" x-show="isAdminOrSupervisor"
              class="px-4 py-3 bg-red-600/20 border border-red-500/30 text-red-400 rounded-xl text-xs font-bold hover:bg-red-500/30 transition-all">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>
