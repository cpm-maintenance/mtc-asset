<!-- 📝 MODAL: MAINTENANCE LOG / NEW SYSTEM ENTRY -->
<div x-cloak
  class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-nexus-black/60 backdrop-blur-md transition-opacity">
  <div class="card-modern w-full max-w-4xl p-8 lg:p-10 rounded-[3rem] max-h-[90vh] overflow-y-auto border-nexus-accent/20 shadow-2xl">
    <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-6">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl gold-gradient flex items-center justify-center shadow-lg">
          <i class="fas fa-clipboard-check text-nexus-black text-xl"></i>
        </div>
        <div>
          <h3 class="text-xl font-black text-white uppercase tracking-tighter" x-text="isEditingLog ? 'Reconstruct Log' : 'New System Entry'"></h3>
          <p class="text-[9px] text-nexus-accent/40 font-black uppercase tracking-widest">Maintenance Activity Protocol</p>
        </div>
      </div>
      <button @click="showLogModal = false"
        class="text-slate-500 hover:text-nexus-accent w-10 h-10 rounded-xl glass flex items-center justify-center transition-all">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <form @submit.prevent="submitLog()" class="space-y-6">

      <div x-show="!isLogDetailView || isEditingLog" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="text-[8px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-2 block">Neural Target (Asset)</label>
          <select :value="logForm.equipmentId" @change="logForm.equipmentId = $event.target.value; if($event.target.value !== 'EXTERNAL') logForm.externalEquipName = ''" required
                  class="w-full p-3 glass text-xs font-bold">
            <option value="">-- Choose Asset Index --</option>
            <template x-for="e in equipment">
              <option :value="e.EquipmentID" x-text="e.EquipmentID + ' - ' + e.Nama"></option>
            </template>
            <option value="EXTERNAL">EXTERNAL - Other / External Request</option>
          </select>
          <input x-show="logForm.equipmentId === 'EXTERNAL'" type="text" x-model="logForm.externalEquipName" placeholder="Enter external equipment/asset name..." x-bind:style="logForm.equipmentId === 'EXTERNAL' ? 'display:block' : 'display:none'"
                 class="w-full p-3 glass text-xs font-bold mt-2">
        </div>
        <div>
          <label class="text-[8px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-2 block">Timeline Date</label>
          <input type="date" x-model="logForm.date" required
                 class="w-full p-3 glass text-xs font-bold text-white">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Activity Type</label>
          <select x-model="logForm.type"
                  class="w-full p-4 glass text-xs font-bold">
            <option value="PM">Prev. Maintenance (PM)</option>
            <option value="Repair">Repair</option>
            <option value="Inspection">Inspection</option>
            <option value="Breakdown">Breakdown</option>
            <option value="Calibration">Calibration</option>
            <option value="Installation">Installation</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div>
          <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Mission Status</label>
          <select x-model="logForm.status"
                  class="w-full p-4 glass text-xs font-bold">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </div>

      <!-- Work Order Section -->
      <div class="mt-6 pt-6 border-t border-nexus-accent/20">
        <h4 class="text-[10px] text-nexus-accent font-black uppercase tracking-widest mb-4">⚡ Work Order Settings</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Priority Level</label>
            <select x-model="logForm.woPriority"
                    class="w-full p-4 glass text-xs font-bold">
              <option value="Planned">Planned - Schedule normally</option>
              <option value="Normal">Normal - Can wait</option>
              <option value="Urgent">Urgent - Fix today</option>
              <option value="Emergency">Emergency - Production stopped</option>
            </select>
          </div>
          <div>
            <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Assigned Technician</label>
            <input type="text" x-model="logForm.assignedTo" placeholder="Technician name"
                   class="w-full p-4 glass text-xs font-bold">
          </div>
          <div>
            <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Due Date</label>
            <input type="date" x-model="logForm.dueDate"
                   class="w-full p-4 glass text-xs font-bold">
          </div>
          <div>
            <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Est. Hours</label>
            <input type="number" x-model="logForm.estimatedHours" placeholder="0" min="0"
                   class="w-full p-4 glass text-xs font-bold">
          </div>
        </div>
      </div>

      <!-- Department Request Section -->
      <div class="mt-6 pt-6 border-t border-nexus-accent/20">
        <h4 class="text-[10px] text-purple-400 font-black uppercase tracking-widest mb-4">🏢 Department Request</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Request Source</label>
            <select x-model="logForm.requestSource"
                    class="w-full p-4 glass text-xs font-bold">
              <option value="Production">Production</option>
              <option value="Maintenance">Maintenance</option>
              <option value="Safety">Safety</option>
              <option value="Quality">Quality</option>
              <option value="Engineering">Engineering</option>
              <option value="Operations">Operations</option>
              <option value="External">External</option>
            </select>
          </div>
          <div>
            <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Requested By</label>
            <input type="text" x-model="logForm.requestedBy" placeholder="Name of requester"
                   class="w-full p-4 glass text-xs font-bold">
          </div>
          <div>
            <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Request Date</label>
            <input type="date" x-model="logForm.requestDate"
                   class="w-full p-4 glass text-xs font-bold">
          </div>
          <div>
            <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Approved By</label>
            <input type="text" x-model="logForm.approvedBy" placeholder="Supervisor/Manager name"
                   class="w-full p-4 glass text-xs font-bold">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-6">
        <div>
          <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Operational Down (Hrs)</label>
          <input type="number" x-model="logForm.downtime" step="0.1" placeholder="0.0"
                 class="w-full p-4 glass font-black text-white">
        </div>
        <div>
          <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Cost ($)</label>
          <input type="number" x-model="logForm.cost" placeholder="0"
                 class="w-full p-4 glass font-black text-white">
        </div>
        <div>
          <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Root Cause (RCA)</label>
          <select x-model="logForm.rca" class="w-full p-4 glass text-[10px] font-bold">
            <option value="PM">Normal PM</option>
            <option value="Human Error">Human Error</option>
            <option value="Fatigue/Wear">Fatigue/Wear</option>
            <option value="External Factor">External Factor</option>
            <option value="Design/Quality">Design/Quality</option>
          </select>
        </div>
      </div>

      <div>
        <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Technical Briefing</label>
        <textarea x-model="logForm.desc" required placeholder="Input technical findings..."
                  class="w-full p-4 glass h-32"></textarea>
      </div>

      <!-- Documentation Photo (Multiple) -->
      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 block">Visual Documentation (Limit 4)</label>
          <span class="text-[10px] font-black text-nexus-accent" x-text="logForm.photos.length + ' / 4'"></span>
        </div>

        <div class="grid grid-cols-4 gap-4">
          <template x-for="(p, idx) in logForm.photos">
            <div class="relative group aspect-square rounded-2xl overflow-hidden glass border-nexus-accent/20 shadow-xl">
              <img :src="p.preview" class="w-full h-full object-cover">
              <button type="button" @click="removeLogPhoto(idx)"
                      class="absolute top-2 right-2 w-7 h-7 rounded-xl bg-rose-500 text-white flex items-center justify-center shadow-lg opacity-0 group-hover:opacity-100 transition-opacity">
                <i class="fas fa-times text-[10px]"></i>
              </button>
            </div>
          </template>

          <!-- Add Button (shows only if < 4) -->
          <label x-show="logForm.photos.length < 4"
                 class="cursor-pointer glass hover:border-nexus-accent text-nexus-accent/20 aspect-square rounded-2xl border-2 border-dashed flex flex-col items-center justify-center gap-2 transition-all">
            <i class="fas fa-plus text-xl"></i>
            <span class="text-[8px] font-black uppercase tracking-widest">Add Photo</span>
            <input type="file" @change="handleLogPhoto($event)" class="hidden" accept="image/*" multiple>
          </label>
        </div>
      </div>

      <div class="glass p-8 rounded-[3rem] border border-white/5">
        <div class="flex justify-between items-center mb-6">
          <span class="text-[9px] font-black text-nexus-accent/40 uppercase tracking-[0.2em]">
            <i class="fas fa-microchip mr-2"></i> Components Linked
          </span>
          <button type="button" @click="addPartToLog()"
                  class="text-[9px] glass text-nexus-accent px-5 py-2.5 rounded-xl border border-nexus-accent/20 font-black hover:bg-nexus-accent/10 transition-all shadow-xl uppercase tracking-widest">
            + Link Part
          </button>
        </div>
        <div x-show="logForm.parts.length === 0" class="text-[10px] text-slate-600 italic text-center py-4 uppercase tracking-widest">
          No components registered to this log.
        </div>
        <template x-for="(part, index) in logForm.parts" :key="index">
          <div class="flex gap-3 mb-4 items-center">
            <select :value="part.id" @change="part.id = $event.target.value"
                    class="flex-1 p-4 glass text-[10px] font-bold">
              <option value="">Select Component...</option>
              <template x-for="p in filteredPartsForLog">
                <option :value="p.PartID" x-text="(p.NamaSingkat || p.NamaPart) + (p.PartNumber ? ' (' + p.PartNumber + ')' : '')"></option>
              </template>
            </select>
            <input type="number" x-model="part.qty" min="1" placeholder="Qty"
                   class="w-20 p-4 glass text-center font-black text-white">
            <button type="button" @click="removePartFromLog(index)"
                    class="text-rose-400 glass hover:bg-rose-500/20 w-12 h-12 rounded-xl border border-rose-500/20 transition-all flex items-center justify-center shadow-xl">
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
        </template>
      </div>

      <button type="submit"
              class="w-full gold-gradient font-black tracking-[0.3em] p-6 rounded-2xl shadow-xl mt-6 hover:scale-[1.02] active:scale-95 transition-all uppercase text-nexus-black"
              x-text="isEditingLog ? 'Execute Update' : 'Initialize Protocol'">
      </button>
    </form>
  </div>
</div>
