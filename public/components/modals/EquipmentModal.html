<!-- 🔧 MODAL: ASSET CONFIGURATION -->
<div x-cloak
     class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-nexus-black/60 backdrop-blur-md transition-all"
     x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
  <div class="card-modern w-full max-w-2xl p-10 rounded-[2.5rem] max-h-[90vh] overflow-y-auto border-nexus-accent/20">
    <div class="flex justify-between items-center mb-10">
      <h3 class="text-2xl font-black text-white flex items-center gap-4 uppercase tracking-tighter">
        <i class="fas fa-microchip text-nexus-accent"></i>
        <span x-text="isEditingEquip ? 'Reconfigure Asset' : 'Initialize Asset'"></span>
      </h3>
      <button @click="showEquipModal = false" class="btn-nexus-close"><i class="fas fa-times"></i></button>
    </div>
    <form @submit.prevent="submitEquipment()" class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div>
        <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Asset Identifier</label>
        <input type="text" x-model="equipForm.id" required placeholder="NEXUS-XXX" :readonly="isEditingEquip"
               class="w-full p-4 glass">
      </div>
      <div>
        <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Designation Name</label>
        <input type="text" x-model="equipForm.nama" required placeholder="System Node Name"
               class="w-full p-4 glass">
      </div>
      <div>
        <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Classification</label>
        <select x-model="equipForm.tipe"
                class="w-full p-4 glass">
          <option>Crusher</option>
          <option>Ball Mill</option>
          <option>Thickener</option>
          <option>Furnace</option>
          <option>Pump</option>
          <option>Conveyor</option>
          <option>Generator</option>
          <option>Other</option>
        </select>
      </div>
      <div>
        <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Operation Sector</label>
        <input type="text" x-model="equipForm.lokasi" placeholder="Area Coordinate"
               class="w-full p-4 glass">
      </div>
      <div>
        <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Operational Status</label>
        <select x-model="equipForm.status"
                class="w-full p-4 glass">
          <option value="Active">Operational</option>
          <option value="In Maintenance">Under Repair</option>
          <option value="Idle">Standby</option>
          <option value="Decommissioned">Offline</option>
        </select>
      </div>
      <div>
        <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Criticality Level</label>
        <select x-model="equipForm.criticality"
                class="w-full p-4 glass">
          <option value="High">Priority Alpha</option>
          <option value="Medium">Priority Beta</option>
          <option value="Low">Priority Gamma</option>
        </select>
      </div>

      <!-- Asset Photo Upload -->
      <div class="md:col-span-2">
        <label class="text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-3 block">Visual Signature</label>
        <div class="flex items-center gap-6 glass p-6 rounded-3xl border-nexus-accent/10">
          <div class="w-28 h-28 rounded-2xl bg-white/5 overflow-hidden border-2 border-dashed border-nexus-accent/20 flex items-center justify-center relative group">
            <template x-if="equipForm.foto">
              <img :src="equipForm.foto" class="w-full h-full object-cover">
            </template>
            <template x-if="!equipForm.foto">
              <i class="fas fa-camera text-nexus-accent/20 text-3xl"></i>
            </template>
            <label class="absolute inset-0 cursor-pointer opacity-0 group-hover:opacity-100 bg-nexus-accent/20 flex items-center justify-center transition-opacity">
              <i class="fas fa-upload text-white"></i>
              <input type="file" @change="handleEquipPhoto($event)" class="hidden" accept="image/*">
            </label>
          </div>
          <div class="flex-1">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Capture Optical Data</p>
            <p class="text-[9px] text-slate-600 mt-1">JPEG/PNG high-resolution formats supported.</p>
            <button type="button" x-show="equipForm.foto" @click="equipForm.foto = ''"
                   class="text-rose-400 text-[9px] font-black uppercase mt-3 tracking-widest flex items-center gap-2">
              <i class="fas fa-trash-alt"></i> Purge Image
            </button>
          </div>
        </div>
      </div>
      <button type="submit"
              class="md:col-span-2 gold-gradient font-black tracking-[0.3em] p-6 rounded-2xl shadow-[0_0_20px_rgba(0,242,255,0.3)] mt-6 hover:scale-[1.02] active:scale-95 transition-all uppercase text-nexus-black"
              x-text="isEditingEquip ? 'Update Neural Configuration' : 'Authorize Deployment'">
      </button>
    </form>
  </div>
</div>
