<!-- ⚙️ MODAL: API SETTINGS -->
<div x-show=\"showAPISettings\" x-cloak class=\"fixed inset-0 z-[250] bg-nexus-black/90 backdrop-blur-sm flex items-center justify-center p-4\" @click.self=\"showAPISettings = false\">
  <div x-transition:enter=\"transition ease-out duration-300\" x-transition:enter-start=\"opacity-0 scale-95\" x-transition:enter-end=\"opacity-100 scale-100\"
    x-transition:leave=\"transition ease-in duration-200\" x-transition:leave-start=\"opacity-100 scale-100\" x-transition:leave-end=\"opacity-0 scale-95\"
    class=\"w-full max-w-md card-modern p-6 border-green-500/30 max-h-[80vh] overflow-y-auto\" style=\"background: linear-gradient(135deg, #1a2e1a 0%, #0d1f0d 100%);\">
    <div class=\"flex items-center justify-between mb-6\">
      <h3 class=\"text-xl font-black text-white nexus-glow-text\">Ajeng Settings</h3>
      <button @click=\"showAPISettings = false\" class=\"w-8 h-8 rounded-lg bg-white/5 text-slate-400 hover:text-white flex items-center justify-center\">
        <i class=\"fas fa-times\"></i>
      </button>
    </div>
    <div class=\"space-y-4\">
      <div>
        <label class=\"text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-2 block\">Provider</label>
        <select x-model=\"aiProvider\" @change=\"updateModelOptions()\" class=\"w-full p-3 glass rounded-lg\">
          <option value=\"openai\">OpenAI</option>
          <option value=\"claude\">Claude</option>
          <option value=\"openrouter\">OpenRouter</option>
        </select>
      </div>
      <div>
        <label class=\"text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-2 block\">Model</label>
        <select x-model=\"aiModel\" class=\"w-full p-3 glass rounded-lg\">
          <template x-for=\"opt in aiModelOptions\" :key=\"opt.value\">
            <option :value=\"opt.value\" x-text=\"opt.label\"></option>
          </template>
        </select>
        <input x-show=\"aiModel === '__custom__'\" type=\"text\" x-model=\"customModelInput\" placeholder=\"model-id (contoh: openai/gpt-4o)\" class=\"w-full p-3 glass rounded-lg mt-2\">
      </div>
      <div>
        <label class=\"text-[9px] text-nexus-accent/40 uppercase font-black tracking-[0.2em] ml-1 mb-2 block\">API Keys (Max 5 - Auto Rotate)</label>
        <div class=\"space-y-2\">
          <input type=\"password\" x-model=\"aiApiKeyInput1\" placeholder=\"API Key 1 (utama)\" class=\"w-full p-3 glass rounded-lg text-sm\"></input>
          <input type=\"password\" x-model=\"aiApiKeyInput2\" placeholder=\"API Key 2 (backup)\" class=\"w-full p-3 glass rounded-lg text-sm\"></input>
          <input type=\"password\" x-model=\"aiApiKeyInput3\" placeholder=\"API Key 3 (backup)\" class=\"w-full p-3 glass rounded-lg text-sm\"></input>
          <input type=\"password\" x-model=\"aiApiKeyInput4\" placeholder=\"API Key 4 (backup)\" class=\"w-full p-3 glass rounded-lg text-sm\"></input>
          <input type=\"password\" x-model=\"aiApiKeyInput5\" placeholder=\"API Key 5 (backup)\" class=\"w-full p-3 glass rounded-lg text-sm\"></input>
        </div>
        <p class=\"text-[9px] text-slate-500 mt-2\">Isi beberapa API key untuk failover otomatis jika limit tercapai</p>
      </div>
    </div>
    <div class=\"flex gap-3 mt-6\">
      <button @click=\"saveAIWithCustomModel()\" class=\"btn-nexus flex-1\">
        <i class=\"fas fa-check mr-2\"></i> Save
      </button>
      <button @click=\"showAPISettings = false\" class=\"btn-nexus-small\">
        Cancel
      </button>
    </div>
  </div>
</div>
