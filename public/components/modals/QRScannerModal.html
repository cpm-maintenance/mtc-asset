<!-- 📱 MODAL: QR SCANNER -->
<div x-cloak
  class="fixed inset-0 z-[100] bg-nexus-black flex flex-col items-center justify-center p-6 backdrop-blur-2xl">
  <div class="w-full max-w-sm space-y-10 text-center relative">
    <div class="absolute -top-16 right-0">
      <button @click="stopScanner()" class="text-white/30 hover:text-nexus-accent transition-colors">
        <i class="fas fa-times text-3xl"></i>
      </button>
    </div>

    <div class="space-y-3 mb-10">
      <h3 class="text-3xl font-black text-white nexus-glow-text uppercase tracking-tighter">Optical Scanner</h3>
      <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Aligning with System Node QR</p>
    </div>

    <div class="relative mx-auto w-full aspect-square max-w-[320px] overflow-hidden rounded-[3rem] border-4 border-nexus-accent/20 shadow-[0_0_50px_rgba(0,242,255,0.15)] bg-black">
      <div id="reader" class="w-full h-full"></div>

      <!-- Professional Scanner Overlay -->
      <div class="absolute inset-0 pointer-events-none border-[50px] border-black/60"></div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-56 h-56 border border-nexus-accent/30 rounded-[2rem] animate-pulse-nexus">
        <div class="absolute top-0 left-0 w-10 h-10 border-t-4 border-l-4 border-nexus-accent rounded-tl-xl shadow-[0_0_15px_rgba(0,242,255,0.5)]"></div>
        <div class="absolute top-0 right-0 w-10 h-10 border-t-4 border-r-4 border-nexus-accent rounded-tr-xl shadow-[0_0_15px_rgba(0,242,255,0.5)]"></div>
        <div class="absolute bottom-0 left-0 w-10 h-10 border-b-4 border-l-4 border-nexus-accent rounded-bl-xl shadow-[0_0_15px_rgba(0,242,255,0.5)]"></div>
        <div class="absolute bottom-0 right-0 w-10 h-10 border-b-4 border-r-4 border-nexus-accent rounded-br-xl shadow-[0_0_15px_rgba(0,242,255,0.5)]"></div>
      </div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[2px] bg-nexus-accent/40 shadow-[0_0_20px_rgba(0,242,255,0.8)] animate-[scan_2s_infinite]"></div>
    </div>

    <button @click="stopScanner()"
            class="glass border-rose-500/30 text-rose-400 px-12 py-5 rounded-2xl font-black tracking-[0.4em] text-[10px] transition-all uppercase hover:bg-rose-500 hover:text-white">
      Abort Operation
    </button>
  </div>
</div>
